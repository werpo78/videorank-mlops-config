apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: videorank-api
  namespace: flux-system
spec:
  dependsOn:
    - name: namespaces
  interval: 5m
  path: ./apps/videorank-api/overlays/dev
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
  timeout: 5m
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: videorank-api
      namespace: videorank-dev


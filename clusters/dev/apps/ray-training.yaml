apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: ray-training
  namespace: flux-system
spec:
  dependsOn:
    - name: kuberay
  interval: 10m
  path: ./jobs/ray-training
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
  timeout: 10m


apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: image-automation
  namespace: flux-system
spec:
  interval: 10m
  path: ./infrastructure/image-automation
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
  timeout: 5m
  healthChecks:
    - apiVersion: image.toolkit.fluxcd.io/v1
      kind: ImageRepository
      name: videorank-api
      namespace: flux-system
    - apiVersion: image.toolkit.fluxcd.io/v1
      kind: ImagePolicy
      name: videorank-api
      namespace: flux-system

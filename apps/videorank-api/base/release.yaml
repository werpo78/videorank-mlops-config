apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: videorank-api
spec:
  interval: 10m
  timeout: 5m
  chart:
    spec:
      chart: ./apps/videorank-api/chart
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  valuesFrom:
    - kind: ConfigMap
      name: videorank-api-values
      valuesKey: values.yaml
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      strategy: rollback
      remediateLastFailure: true
  rollback:
    timeout: 5m
    cleanupOnFail: false

apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kuberay-operator
  namespace: ray-system
spec:
  interval: 10m
  chart:
    spec:
      chart: kuberay-operator
      version: "1.6.0"
      sourceRef:
        kind: HelmRepository
        name: kuberay
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    singleNamespaceInstall: false

